<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A1628'/%3E%3Ctext x='16' y='22' font-family='Arial,Helvetica,sans-serif' font-size='14' font-weight='700' fill='%23F5B301' text-anchor='middle'%3EAM%3C/text%3E%3C/svg%3E">
<title>Mortalidad — SIGAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap');
  :root {
    --navy: #0A1628;
    --mustard: #F5B301;
    --green: #1a6b3c;
    --surface: #f5f4f1;
    --border: rgba(10,22,40,0.12);
    --card: #fff;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--surface);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    background: var(--navy);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .logo-mark {
    width: 28px; height: 28px;
    border: 1.5px solid var(--mustard);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .app-name { font-family: 'DM Serif Display', serif; color: #fff; font-size: 16px; }
  .app-name span { color: var(--mustard); }
  .topbar-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-left: auto; }

  /* MAIN */
  .main { flex: 1; padding: 1.25rem; max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px)); }

  /* SECTION LABEL */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: #8a95a3;
    margin: 1.25rem 0 .6rem;
  }
  .section-label:first-child { margin-top: 0; }

  /* FIELD */
  .field { margin-bottom: .9rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #5a6778; margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: .55rem .75rem;
    border: 1px solid var(--border);
    border-radius: 8px; font-family: 'Outfit', sans-serif;
    font-size: 14px; background: var(--card);
    color: var(--navy); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,107,60,.1);
  }
  .field textarea { resize: vertical; min-height: 72px; }

  /* ROW */
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

  /* ID TABS */
  .id-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .9rem; }
  .id-tab {
    padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s; color: #5a6778;
    user-select: none;
  }
  .id-tab.active {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .id-panel { display: none; }
  .id-panel.active { display: block; }

  /* GPS */
  .gps-row { display: flex; gap: .5rem; align-items: center; }
  .gps-row input { flex: 1; }
  .btn-gps {
    padding: .5rem .85rem; border-radius: 8px;
    background: var(--navy); color: #fff; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: opacity .15s;
    font-family: 'Outfit', sans-serif;
  }
  .btn-gps:disabled { opacity: .5; cursor: default; }

  /* PHOTOS */
  .photo-slots { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .photo-slot { }
  .photo-slot label { display: block; font-size: 12px; font-weight: 600; color: #5a6778; margin-bottom: 4px; }
  .photo-slot-inner {
    border: 1.5px dashed var(--border);
    border-radius: 10px; background: var(--card);
    aspect-ratio: 1; position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; overflow: hidden;
    transition: border-color .15s;
  }
  .photo-slot-inner:hover { border-color: var(--green); }
  .photo-slot-inner input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-slot-inner .slot-icon { font-size: 26px; color: #b0bec5; pointer-events: none; }
  .photo-slot-inner .slot-text { font-size: 10px; color: #8a95a3; pointer-events: none; text-align: center; padding: 0 8px; }
  .photo-slot-inner img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; border-radius: 9px;
  }
  .photo-slot-inner .remove-photo {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,.55); color: #fff;
    border: none; border-radius: 50%; width: 22px; height: 22px;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    z-index: 2;
  }
  .photo-slot-inner.has-photo .remove-photo { display: flex; }
  .photo-slot-inner.has-photo .slot-icon,
  .photo-slot-inner.has-photo .slot-text { display: none; }

  /* CAUSA OUTRA */
  #causa-outra-wrap { display: none; margin-top: 8px; }
  #causa-outra-wrap.visible { display: block; }

  /* STATUS MESSAGE */
  .status-msg {
    border-radius: 8px; padding: .65rem .9rem;
    font-size: 13px; font-weight: 500; margin-top: .5rem;
    display: none;
  }
  .status-msg.error { background: #fdecea; color: var(--danger); display: block; }
  .status-msg.success { background: #e8f5e9; color: var(--green); display: block; }
  .status-msg.info { background: #e3f2fd; color: #1565c0; display: block; }

  /* SUBMIT BAR */
  .submit-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: .85rem 1.25rem;
    padding-bottom: calc(.85rem + env(safe-area-inset-bottom, 0px));
    z-index: 99;
  }
  .btn-submit {
    width: 100%; padding: .85rem;
    background: var(--green); color: #fff;
    border: none; border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-submit:disabled { opacity: .5; cursor: default; }
  .btn-submit:not(:disabled):hover { opacity: .9; }

  /* SPINNER */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RFID BADGE */
  .rfid-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #e8f5e9; color: var(--green);
    border: 1px solid rgba(26,107,60,.2);
    border-radius: 8px; padding: .5rem .75rem;
    font-size: 13px; font-weight: 500;
  }

  /* RESPONSIVE */
  @media (max-width: 400px) {
    .row { grid-template-columns: 1fr; }
    .photo-slots { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <text x="9" y="13" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#F5B301" text-anchor="middle">AM</text>
    </svg>
  </div>
  <span class="app-name">SIG<span>AM</span></span>
  <span class="topbar-sub">Mortalidad</span>
</div>

<div class="main">

  <!-- ESTABLECIMIENTO + FECHA -->
  <div class="section-label">Establecimiento y fecha</div>

  <div class="field">
    <label for="estab">Establecimiento *</label>
    <select id="estab">
      <option value="">Seleccionar...</option>
      <option>Ypoti</option>
      <option>Ypoti 2</option>
      <option>Cerro Memby</option>
      <option>Santa Clara</option>
      <option>Lusipar</option>
      <option>Santa Maria da Serra</option>
      <option>Cielo Azul</option>
    </select>
  </div>

  <div class="row">
    <div class="field">
      <label for="fecha">Fecha *</label>
      <input type="date" id="fecha">
    </div>
    <div class="field">
      <label for="hora">Hora</label>
      <input type="time" id="hora">
    </div>
  </div>

  <!-- IDENTIFICACION -->
  <div class="section-label">Identificación del animal</div>

  <div class="id-tabs">
    <div class="id-tab active" data-tab="manual">Manual</div>
    <div class="id-tab" data-tab="rfid">RFID</div>
    <div class="id-tab" data-tab="foto">Foto botón</div>
    <div class="id-tab" data-tab="sinid">Sin ID</div>
  </div>

  <!-- Manual -->
  <div class="id-panel active" id="panel-manual">
    <div class="field">
      <label for="caravana-manual">N° caravana / botón *</label>
      <input type="text" id="caravana-manual" placeholder="Ej: 1234" inputmode="text" autocomplete="off">
    </div>
  </div>

  <!-- RFID -->
  <div class="id-panel" id="panel-rfid">
    <div class="field">
      <label>Lectura RFID</label>
      <div style="display:flex;gap:.5rem;align-items:flex-start;">
        <input type="text" id="caravana-rfid" placeholder="Escanear o ingresar EID..." style="flex:1">
        <button class="btn-gps" id="btn-rfid-scan" style="margin-top:0">📡 Escanear</button>
      </div>
      <div id="rfid-status" style="margin-top:6px;font-size:12px;color:#8a95a3;"></div>
    </div>
  </div>

  <!-- Foto botón -->
  <div class="id-panel" id="panel-foto">
    <div class="field">
      <label>Foto del botón / caravana</label>
      <div class="photo-slot-inner" id="slot-boton" style="max-width:180px;aspect-ratio:1;">
        <input type="file" accept="image/*" capture="environment" id="file-boton">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Foto botón</div>
        <img id="preview-boton" src="" alt="">
        <button class="remove-photo" id="rm-boton" type="button">✕</button>
      </div>
    </div>
    <div class="field">
      <label for="caravana-foto">N° leído en foto (opcional)</label>
      <input type="text" id="caravana-foto" placeholder="Si puede leerlo..." inputmode="text">
    </div>
  </div>

  <!-- Sin ID -->
  <div class="id-panel" id="panel-sinid">
    <div class="field">
      <label for="sinid-desc">Descripción del animal *</label>
      <input type="text" id="sinid-desc" placeholder="Ej: vaca negra, aprox. 3 años" autocomplete="off">
    </div>
  </div>

  <!-- CATEGORIA -->
  <div class="section-label">Categoría y causa</div>

  <div class="row">
    <div class="field">
      <label for="categoria">Categoría *</label>
      <select id="categoria">
        <option value="">Seleccionar...</option>
        <option>Ternero/a</option>
        <option>Novillo</option>
        <option>Vaquillona</option>
        <option>Vaca</option>
        <option>Toro</option>
        <option>Buey</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="field">
      <label for="sexo">Sexo</label>
      <select id="sexo">
        <option value="">—</option>
        <option>Macho</option>
        <option>Hembra</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label for="causa">Causa de muerte *</label>
    <select id="causa">
      <option value="">Seleccionar...</option>
      <option>Enfermedad</option>
      <option>Accidente</option>
      <option>Predador</option>
      <option>Parto</option>
      <option>Causa desconocida</option>
      <option>Otra</option>
    </select>
  </div>

  <div id="causa-outra-wrap">
    <div class="field">
      <label for="causa-outra">Especificar causa *</label>
      <input type="text" id="causa-outra" placeholder="Describir la causa...">
    </div>
  </div>

  <!-- UBICACION GPS -->
  <div class="section-label">Ubicación</div>

  <div class="field">
    <label>Coordenadas GPS</label>
    <div class="gps-row">
      <input type="text" id="gps-lat" placeholder="Latitud" readonly>
      <input type="text" id="gps-lon" placeholder="Longitud" readonly>
      <button class="btn-gps" id="btn-gps">📍 Capturar</button>
    </div>
    <div id="gps-status" class="status-msg" style="margin-top:6px;"></div>
  </div>

  <!-- FOTOS DEL ANIMAL -->
  <div class="section-label">Fotos del animal</div>

  <div class="photo-slots">
    <div class="photo-slot">
      <label>Botón / caravana</label>
      <div class="photo-slot-inner" id="slot-caravana">
        <input type="file" accept="image/*" capture="environment" id="file-caravana">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Foto botón</div>
        <img id="preview-caravana" src="" alt="">
        <button class="remove-photo" id="rm-caravana" type="button">✕</button>
      </div>
    </div>
    <div class="photo-slot">
      <label>Animal completo</label>
      <div class="photo-slot-inner" id="slot-animal">
        <input type="file" accept="image/*" capture="environment" id="file-animal">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Foto animal</div>
        <img id="preview-animal" src="" alt="">
        <button class="remove-photo" id="rm-animal" type="button">✕</button>
      </div>
    </div>
  </div>

  <!-- OBSERVACIONES -->
  <div class="section-label">Observaciones</div>

  <div class="field">
    <label for="obs">Notas adicionales</label>
    <textarea id="obs" placeholder="Detalles del hallazgo, síntomas observados..."></textarea>
  </div>

  <div id="form-status" class="status-msg"></div>

</div><!-- /main -->

<div class="submit-bar">
  <button class="btn-submit" id="btn-submit">Registrar mortalidad</button>
</div>

<script>
(function() {
  'use strict';

  // ─── DATE / TIME AUTO-FILL ─────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
  var timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('fecha').value = dateStr;
  document.getElementById('hora').value = timeStr;

  // ─── ID TABS ───────────────────────────────────────────────────────────
  var tabs = document.querySelectorAll('.id-tab');
  var panels = document.querySelectorAll('.id-panel');
  var currentTab = 'manual';

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var target = this.getAttribute('data-tab');
      currentTab = target;
      tabs.forEach(function(t) { t.classList.remove('active'); });
      panels.forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      var panel = document.getElementById('panel-' + target);
      if (panel) panel.classList.add('active');
    });
  });

  // ─── RFID SCAN (simulated — real BLE/serial integration TBD) ──────────
  document.getElementById('btn-rfid-scan').addEventListener('click', function() {
    var statusEl = document.getElementById('rfid-status');
    statusEl.textContent = 'Buscando lector RFID...';
    // Placeholder: in a real app this would connect to a BLE RFID reader
    setTimeout(function() {
      statusEl.textContent = 'Lector no encontrado. Ingrese el EID manualmente.';
    }, 1500);
  });

  // ─── CAUSA OUTRA ───────────────────────────────────────────────────────
  document.getElementById('causa').addEventListener('change', function() {
    var wrap = document.getElementById('causa-outra-wrap');
    if (this.value === 'Otra') {
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  });

  // ─── GPS ───────────────────────────────────────────────────────────────
  var btnGps = document.getElementById('btn-gps');
  var gpsStatus = document.getElementById('gps-status');

  btnGps.addEventListener('click', function() {
    if (!navigator.geolocation) {
      showGpsStatus('error', 'Geolocalización no disponible en este dispositivo.');
      return;
    }
    btnGps.disabled = true;
    btnGps.textContent = '⏳ Capturando...';
    showGpsStatus('info', 'Obteniendo ubicación GPS...');

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        document.getElementById('gps-lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('gps-lon').value = pos.coords.longitude.toFixed(6);
        btnGps.disabled = false;
        btnGps.textContent = '✓ Recapturar';
        var acc = Math.round(pos.coords.accuracy);
        showGpsStatus('success', 'Ubicación obtenida. Precisión: ±' + acc + ' m');
      },
      function(err) {
        btnGps.disabled = false;
        btnGps.textContent = '📍 Capturar';
        var msgs = {
          1: 'Permiso de ubicación denegado. Habilítelo en Configuración.',
          2: 'No se pudo obtener la posición. Verifique señal GPS.',
          3: 'Tiempo de espera agotado. Intente nuevamente.'
        };
        showGpsStatus('error', msgs[err.code] || 'Error al obtener ubicación.');
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });

  function showGpsStatus(type, msg) {
    gpsStatus.className = 'status-msg ' + type;
    gpsStatus.textContent = msg;
    gpsStatus.style.display = 'block';
  }

  // ─── PHOTO SLOTS ───────────────────────────────────────────────────────
  function setupPhotoSlot(slotId, fileId, previewId, rmId) {
    var slot = document.getElementById(slotId);
    var fileInput = document.getElementById(fileId);
    var preview = document.getElementById(previewId);
    var rmBtn = document.getElementById(rmId);

    fileInput.addEventListener('change', function() {
      var file = this.files && this.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        preview.src = e.target.result;
        slot.classList.add('has-photo');
      };
      reader.readAsDataURL(file);
    });

    rmBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      preview.src = '';
      fileInput.value = '';
      slot.classList.remove('has-photo');
    });
  }

  // Photo slot in "foto botón" tab
  setupPhotoSlot('slot-boton', 'file-boton', 'preview-boton', 'rm-boton');
  // Photo slots in bottom section
  setupPhotoSlot('slot-caravana', 'file-caravana', 'preview-caravana', 'rm-caravana');
  setupPhotoSlot('slot-animal', 'file-animal', 'preview-animal', 'rm-animal');

  // ─── SUBMIT ───────────────────────────────────────────────────────────
  var btnSubmit = document.getElementById('btn-submit');
  var formStatus = document.getElementById('form-status');

  btnSubmit.addEventListener('click', function() {
    formStatus.style.display = 'none';
    formStatus.className = 'status-msg';

    var errors = [];

    // Establecimiento
    if (!document.getElementById('estab').value) {
      errors.push('Seleccione un establecimiento.');
    }

    // Fecha
    if (!document.getElementById('fecha').value) {
      errors.push('Ingrese la fecha.');
    }

    // Identificación según pestaña activa
    if (currentTab === 'manual') {
      if (!document.getElementById('caravana-manual').value.trim()) {
        errors.push('Ingrese el número de caravana / botón.');
      }
    } else if (currentTab === 'rfid') {
      if (!document.getElementById('caravana-rfid').value.trim()) {
        errors.push('Ingrese o escanee el EID (RFID).');
      }
    } else if (currentTab === 'sinid') {
      if (!document.getElementById('sinid-desc').value.trim()) {
        errors.push('Ingrese una descripción del animal.');
      }
    }
    // foto tab: no mandatory field

    // Categoría
    if (!document.getElementById('categoria').value) {
      errors.push('Seleccione la categoría del animal.');
    }

    // Causa
    var causa = document.getElementById('causa').value;
    if (!causa) {
      errors.push('Seleccione la causa de muerte.');
    }
    if (causa === 'Otra' && !document.getElementById('causa-outra').value.trim()) {
      errors.push('Especifique la causa de muerte.');
    }

    if (errors.length > 0) {
      formStatus.className = 'status-msg error';
      formStatus.textContent = errors[0];
      formStatus.style.display = 'block';
      formStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    // Gather data
    var idValue = '';
    if (currentTab === 'manual') idValue = document.getElementById('caravana-manual').value.trim();
    else if (currentTab === 'rfid') idValue = document.getElementById('caravana-rfid').value.trim();
    else if (currentTab === 'foto') idValue = document.getElementById('caravana-foto').value.trim() || '(foto)';
    else if (currentTab === 'sinid') idValue = document.getElementById('sinid-desc').value.trim();

    var record = {
      estab: document.getElementById('estab').value,
      fecha: document.getElementById('fecha').value,
      hora: document.getElementById('hora').value,
      idMode: currentTab,
      id: idValue,
      categoria: document.getElementById('categoria').value,
      sexo: document.getElementById('sexo').value,
      causa: causa === 'Otra' ? document.getElementById('causa-outra').value.trim() : causa,
      lat: document.getElementById('gps-lat').value,
      lon: document.getElementById('gps-lon').value,
      obs: document.getElementById('obs').value.trim(),
      ts: new Date().toISOString()
    };

    // Save to localStorage as pending queue
    var queue = [];
    try { queue = JSON.parse(localStorage.getItem('mort_queue') || '[]'); } catch(e) {}
    queue.push(record);
    try { localStorage.setItem('mort_queue', JSON.stringify(queue)); } catch(e) {}

    // Show loading state
    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<span class="spinner"></span>Registrando...';

    // Simulate async submit (replace with real API call)
    setTimeout(function() {
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Registrar mortalidad';
      formStatus.className = 'status-msg success';
      formStatus.textContent = '✓ Registro guardado correctamente. (' + record.estab + ' — ' + record.fecha + ')';
      formStatus.style.display = 'block';
      formStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Clear form (except estab + fecha)
      var savedEstab = document.getElementById('estab').value;
      document.getElementById('caravana-manual').value = '';
      document.getElementById('caravana-rfid').value = '';
      document.getElementById('caravana-foto').value = '';
      document.getElementById('sinid-desc').value = '';
      document.getElementById('categoria').value = '';
      document.getElementById('sexo').value = '';
      document.getElementById('causa').value = '';
      document.getElementById('causa-outra').value = '';
      document.getElementById('causa-outra-wrap').classList.remove('visible');
      document.getElementById('gps-lat').value = '';
      document.getElementById('gps-lon').value = '';
      document.getElementById('gps-status').style.display = 'none';
      document.getElementById('obs').value = '';
      // Reset photos
      ['caravana','animal','boton'].forEach(function(k) {
        var p = document.getElementById('preview-' + k);
        var s = document.getElementById('slot-' + k);
        var f = document.getElementById('file-' + k);
        if (p) p.src = '';
        if (s) s.classList.remove('has-photo');
        if (f) f.value = '';
      });
      // Restore estab
      document.getElementById('estab').value = savedEstab;
    }, 900);
  });

})();
</script>
